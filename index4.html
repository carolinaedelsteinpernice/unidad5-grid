<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLife</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>FitLife</h1>
    <p>Registrate y comenzá tu vida saludable.</p>
</header>

<main>

<section>

<h2>Registro de Usuario</h2>

<form action="https://formspree.io/f/xojgekra" method="POST">

<fieldset>

<legend>Datos Personales</legend>

<label for="nombre">Nombre completo</label>
<input type="text" id="nombre" name="nombre" required placeholder="Juan Pérez" autocomplete="name">

<label for="email">Correo electrónico</label>
<input type="email" id="email" name="email" required placeholder="correo@email.com" autocomplete="email">

<label for="password">Contraseña</label>
<input type="password" id="password" name="password" required minlength="8" placeholder="********" autocomplete="new-password">

<label for="edad">Edad</label>
<input type="number" id="edad" name="edad" min="13" max="100" required>

<label for="fecha">Fecha de nacimiento</label>
<input type="date" id="fecha" name="fecha" required>

<label for="usuario">Nombre de usuario</label>
<input
type="text"
id="usuario"
name="usuario"
required
minlength="5"
maxlength="12"
pattern="[A-Za-z0-9]{5,12}"
placeholder="usuario123">

</fieldset>

<fieldset>

<legend>Información adicional</legend>

<label for="pais">País</label>

<select id="pais" name="pais" required>

<option value="">Seleccione...</option>

<option>Argentina</option>

<option>Chile</option>

<option>Uruguay</option>

<option>Brasil</option>

<option>España</option>

</select>

<label for="ciudad">Ciudad</label>

<input list="ciudades" id="ciudad" name="ciudad" required>

<datalist id="ciudades">
<option value="Buenos Aires">
<option value="Córdoba">
<option value="Rosario">
<option value="Mendoza">
<option value="Mar del Plata">
</datalist>

<p>Género</p>

<input type="radio" id="mujer" name="genero" value="Mujer">
<label for="mujer">Mujer</label>

<input type="radio" id="hombre" name="genero" value="Hombre">
<label for="hombre">Hombre</label>

<input type="radio" id="otro" name="genero" value="Otro">
<label for="otro">Otro</label>

<p>Intereses</p>

<input type="checkbox" id="pesas" name="intereses" value="Pesas">
<label for="pesas">Pesas</label>

<input type="checkbox" id="running" name="intereses" value="Running">
<label for="running">Running</label>

<input type="checkbox" id="yoga" name="intereses" value="Yoga">
<label for="yoga">Yoga</label>

<br><br>

<label for="bio">Biografía</label>

<textarea
id="bio"
name="biografia"
rows="5"
maxlength="250"
placeholder="Contanos sobre vos..."></textarea>

</fieldset>

<button type="submit">Registrarme</button>

</form>

</section>

<hr>

<section>

<h2>Contacto</h2>

<form action="https://formspree.io/f/xojgekra" method="POST">

<label for="nombreContacto">Nombre</label>

<input
type="text"
id="nombreContacto"
name="nombre"
required>

<label for="emailContacto">Email</label>

<input
type="email"
id="emailContacto"
name="email"
required>

<label for="motivo">Motivo</label>

<select id="motivo" name="motivo">

<option>Consulta</option>

<option>Problema técnico</option>

<option>Sugerencia</option>

</select>

<label for="mensaje">Mensaje</label>

<textarea
id="mensaje"
name="mensaje"
rows="6"
required></textarea>

<br>

<input
type="checkbox"
id="terminos"
name="terminos"
required>

<label for="terminos">
Acepto los términos y condiciones
</label>

<br><br>

<button type="submit">Enviar</button>

</form>

</section>

</main>

</body>
</html>
